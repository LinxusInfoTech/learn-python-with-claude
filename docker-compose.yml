version: '3.8'

services:
  learn-python:
    build: .
    container_name: learn-python-with-claude
    ports:
      - "8000:8000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    volumes:
      - ./01-python-basics:/app/01-python-basics
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/api/lessons')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
