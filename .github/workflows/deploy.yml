name: Deploy to Kubernetes

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  K8S_NAMESPACE: default

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
        chmod 600 $HOME/.kube/config

    - name: Install kubectl
      uses: azure/setup-kubectl@v5
      with:
        version: 'v1.28.0'

    - name: Get image tag
      id: image
      run: |
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          TAG=${GITHUB_REF#refs/tags/}
        else
          TAG=latest
        fi
        echo "tag=$TAG" >> $GITHUB_OUTPUT
        echo "IMAGE_URI=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$TAG" >> $GITHUB_OUTPUT

    - name: Update Kubernetes deployment
      run: |
        kubectl set image deployment/learn-python-with-claude \
          app=${{ steps.image.outputs.IMAGE_URI }} \
          -n ${{ env.K8S_NAMESPACE }} \
          --record

    - name: Wait for rollout
      run: |
        kubectl rollout status deployment/learn-python-with-claude \
          -n ${{ env.K8S_NAMESPACE }} \
          --timeout=5m

    - name: Verify deployment
      run: |
        kubectl get deployment,pods,svc -n ${{ env.K8S_NAMESPACE }} \
          -l app=learn-python-with-claude

    - name: Slack Notification
      if: always()
      uses: slackapi/slack-github-action@v1.24.0
      with:
        payload: |
          {
            "text": "Learn Python with Claude - Kubernetes Deployment",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*${{ job.status == 'success' && '✅' || '❌' }} Deployment Status*\nTag: `${{ steps.image.outputs.tag }}`\nRef: `${{ github.ref }}`"
                }
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
