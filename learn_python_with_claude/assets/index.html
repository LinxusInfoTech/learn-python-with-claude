<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Python Learning</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar - Lessons */
        .sidebar {
            width: 250px;
            background: #1e293b;
            border-right: 1px solid #334155;
            overflow-y: auto;
            padding: 20px;
        }

        .sidebar h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #60a5fa;
        }

        .lesson-item {
            padding: 12px;
            margin-bottom: 10px;
            background: #334155;
            border: 2px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        .lesson-item:hover {
            background: #475569;
            border-color: #60a5fa;
        }

        .lesson-item.active {
            background: #0ea5e9;
            color: white;
            border-color: #0284c7;
        }

        /* Main content area */
        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* Lesson content */
        .content-area {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            background: #0f172a;
        }

        .content-area h1 {
            font-size: 28px;
            margin-bottom: 20px;
            color: #60a5fa;
        }

        .lesson-content {
            line-height: 1.8;
            color: #cbd5e1;
        }

        .lesson-content p {
            margin-bottom: 15px;
        }

        .lesson-content code {
            background: #1e293b;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Monaco', 'Courier New', monospace;
            color: #fbbf24;
        }

        .lesson-content pre {
            background: #1e293b;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 15px 0;
            border-left: 3px solid #60a5fa;
        }

        .lesson-content pre code {
            background: none;
            padding: 0;
            color: #e2e8f0;
        }

        /* Chat panel */
        .chat-panel {
            width: 350px;
            background: #1e293b;
            border-left: 1px solid #334155;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 15px;
            border-bottom: 1px solid #334155;
            font-weight: bold;
            color: #60a5fa;
            font-size: 14px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            line-height: 1.4;
        }

        .message.user {
            background: #0ea5e9;
            color: white;
            margin-left: 10px;
            text-align: right;
        }

        .message.assistant {
            background: #334155;
            color: #e2e8f0;
            margin-right: 10px;
        }

        .chat-input-area {
            padding: 15px;
            border-top: 1px solid #334155;
            display: flex;
            gap: 10px;
        }

        .chat-input-area textarea {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 10px;
            color: #e2e8f0;
            font-family: inherit;
            font-size: 12px;
            resize: none;
            min-height: 60px;
            max-height: 100px;
        }

        .chat-input-area textarea:focus {
            outline: none;
            border-color: #60a5fa;
        }

        .chat-input-area button {
            background: #0ea5e9;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 10px 15px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: all 0.2s;
        }

        .chat-input-area button:hover {
            background: #0284c7;
        }

        .chat-input-area button:active {
            transform: scale(0.98);
        }

        .loading {
            display: inline-block;
            color: #60a5fa;
            font-size: 12px;
        }

        .loading::after {
            content: "...";
            animation: dots 0.6s steps(3, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: "."; }
            40% { content: ".."; }
            60%, 100% { content: "..."; }
        }

        /* Selection hint */
        .selection-hint {
            font-size: 11px;
            color: #64748b;
            padding: 10px;
            text-align: center;
            border-top: 1px solid #334155;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1e293b;
        }

        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        @media (max-width: 1200px) {
            .chat-panel {
                width: 300px;
            }
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .sidebar, .chat-panel {
                width: 100%;
                height: auto;
                max-height: 200px;
            }

            .main {
                flex-direction: column;
            }

            .content-area {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Left Sidebar: Lessons -->
        <div class="sidebar">
            <h2>📚 Lessons</h2>
            <div id="lessonsList"></div>
        </div>

        <!-- Main: Lesson Content -->
        <div class="main">
            <div class="content-area">
                <div id="lessonContent">
                    <h1>Welcome to Interactive Python Learning</h1>
                    <p style="color: #64748b; margin-top: 20px;">
                        ← Select a lesson from the left to get started.
                        <br><br>
                        Then, you can:
                        <br>• <strong>Read</strong> the lesson
                        <br>• <strong>Select any text</strong> on the page
                        <br>• <strong>Ask Claude</strong> questions about it on the right panel
                    </p>
                </div>
            </div>

            <!-- Right Sidebar: Chat with Claude -->
            <div class="chat-panel">
                <div class="chat-header">💬 Ask Claude</div>
                <div class="chat-messages" id="chatMessages"></div>
                <div class="selection-hint">Tip: Select text → ask questions →</div>
                <div class="chat-input-area">
                    <textarea id="chatInput" placeholder="Ask me anything about this lesson..."></textarea>
                    <button onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentLesson = null;

        // Load lessons on page load
        async function loadLessons() {
            try {
                const res = await fetch("/api/lessons");
                const data = await res.json();
                const lessonsList = document.getElementById("lessonsList");

                lessonsList.innerHTML = data.lessons
                    .map(lesson => `
                        <div class="lesson-item" onclick="loadLesson('${lesson.id}')">
                            ${lesson.title}
                        </div>
                    `)
                    .join("");
            } catch (error) {
                console.error("Error loading lessons:", error);
            }
        }

        // Load a specific lesson
        async function loadLesson(lessonId) {
            try {
                const res = await fetch(`/api/lessons/${lessonId}`);
                const lesson = await res.json();
                currentLesson = lessonId;

                // Update sidebar highlight
                document.querySelectorAll(".lesson-item").forEach(el => el.classList.remove("active"));
                event.target.classList.add("active");

                // Display lesson content
                const content = lesson.content
                    .split("\n")
                    .map(line => line.trim())
                    .filter(line => line)
                    .join("\n");

                // Simple markdown to HTML conversion
                let html = `<h1>${lesson.title}</h1>\n`;
                const lines = content.split("\n");
                let inCodeBlock = false;
                let codeBlock = "";

                for (let line of lines) {
                    if (line.startsWith("```")) {
                        if (inCodeBlock) {
                            html += `<pre><code>${escapeHtml(codeBlock.trim())}</code></pre>\n`;
                            codeBlock = "";
                            inCodeBlock = false;
                        } else {
                            inCodeBlock = true;
                        }
                    } else if (inCodeBlock) {
                        codeBlock += line + "\n";
                    } else if (line.startsWith("**") && line.endsWith("**")) {
                        html += `<p><strong>${escapeHtml(line.slice(2, -2))}</strong></p>\n`;
                    } else if (line) {
                        html += `<p>${escapeHtml(line)}</p>\n`;
                    }
                }

                document.getElementById("lessonContent").innerHTML = `<div class="lesson-content">${html}</div>`;
                document.getElementById("chatMessages").innerHTML = "";
            } catch (error) {
                console.error("Error loading lesson:", error);
            }
        }

        // Send message to Claude
        async function sendMessage() {
            const input = document.getElementById("chatInput");
            const message = input.value.trim();
            if (!message) return;

            // Get selected text
            const selectedText = window.getSelection().toString();

            // Add user message to chat
            const chatMessages = document.getElementById("chatMessages");
            chatMessages.innerHTML += `<div class="message user">${escapeHtml(message)}</div>`;
            input.value = "";
            chatMessages.scrollTop = chatMessages.scrollHeight;

            // Show loading
            chatMessages.innerHTML += `<div class="message assistant"><span class="loading"></span></div>`;
            chatMessages.scrollTop = chatMessages.scrollHeight;

            try {
                const res = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message,
                        lesson_id: currentLesson,
                        selected_text: selectedText
                    })
                });

                const data = await res.json();
                chatMessages.lastChild.innerHTML = escapeHtml(data.reply);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            } catch (error) {
                chatMessages.lastChild.innerHTML = `<strong>Error:</strong> ${escapeHtml(error.message)}`;
            }
        }

        // Enter to send message
        document.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && e.ctrlKey) {
                sendMessage();
            }
        });

        // Escape HTML
        function escapeHtml(text) {
            const map = {
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#039;"
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Load lessons on page load
        loadLessons();
    </script>
</body>
</html>
