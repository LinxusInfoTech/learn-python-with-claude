apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: learn-python-ingress
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - learn-python.example.com
    secretName: learn-python-tls
  rules:
  - host: learn-python.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: learn-python-with-claude
            port:
              number: 80
