apiVersion: v1
kind: Secret
metadata:
  name: learn-python-secrets
  namespace: default
type: Opaque
stringData:
  # Replace YOUR_API_KEY with your actual Anthropic API key
  anthropic-api-key: YOUR_API_KEY
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: python-lessons-content
  namespace: default
data:
  lessons.json: |
    {
      "variables": "A variable is a labeled box that holds a value...",
      "types": "Every value in Python has a type...",
      "fstrings": "F-strings let you put variables into text cleanly...",
      "functions": "A function is code you write ONCE and use MANY TIMES..."
    }
