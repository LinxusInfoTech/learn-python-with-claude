apiVersion: apps/v1
kind: Deployment
metadata:
  name: learn-python-with-claude
  namespace: default
  labels:
    app: learn-python-with-claude
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: learn-python-with-claude
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: learn-python-with-claude
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      serviceAccountName: learn-python-with-claude
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: app
        image: learn-python-with-claude:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        env:
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: learn-python-secrets
              key: anthropic-api-key
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /api/lessons
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/lessons
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        volumeMounts:
        - name: lessons
          mountPath: /app/lessons
          readOnly: true
      volumes:
      - name: lessons
        configMap:
          name: python-lessons-content
---
apiVersion: v1
kind: Service
metadata:
  name: learn-python-with-claude
  namespace: default
  labels:
    app: learn-python-with-claude
spec:
  type: ClusterIP
  selector:
    app: learn-python-with-claude
  ports:
  - name: http
    port: 80
    targetPort: 8000
    protocol: TCP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: learn-python-with-claude
  namespace: default
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: learn-python-with-claude
  namespace: default
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: learn-python-with-claude
